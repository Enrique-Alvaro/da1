openapi: 3.0.3
info:
  title: Crown Bid API
  description: |
    REST API for the Crown Bid mobile application (UADE DA1 - 1C2026).

    ## Overview
    This API powers a mobile auction management system where users can:
    - Register and manage their profile (2-step registration)
    - Browse and participate in real-time ascending auctions
    - Submit items to be auctioned by the company
    - Manage payment methods (bank accounts, credit cards, certified checks)

    ## Authentication
    All endpoints (except public ones) require a JWT Bearer token obtained via `/auth/login`.

    ## User Roles
    - **client**: Registered buyer/bidder
    - **owner**: Product owner submitting items for auction
    - **employee**: Internal staff (product review, verification, catalog management)
    - **auctioneer**: Licensed auctioneer managing live auctions

    ## User Categories
    Clients are assigned a category that determines auction access:
    `comun` < `especial` < `plata` < `oro` < `platino`

    A client can only join auctions with a category equal to or below their own.
    `oro` and `platino` users have no bid amount limits.

    ## Real-time Bidding
    Live auction bidding uses WebSocket connections. See the `/ws/auctions/{id}` section for message formats.
  version: 1.0.0
  contact:
    name: Crown Bid Dev Team

servers:
  - url: http://localhost:3000/api/v1
    description: Local development
  - url: https://api.crownbid.com/api/v1
    description: Production

tags:
  - name: Auth
    description: Registration, login, email verification, password reset
  - name: Users
    description: User profile and metrics
  - name: Payment Methods
    description: CRUD for bank accounts, credit cards, and certified checks
  - name: Auctions
    description: Browse auctions, view catalogs, register as attendee
  - name: Bidding
    description: Place bids, view bid history, real-time updates
  - name: Products
    description: Submit items for auction, manage photos, inspection flow
  - name: Insurance
    description: View and manage insurance policies for products
  - name: Countries
    description: Reference data for countries
  - name: Admin
    description: Internal endpoints for employees and auctioneers

# ──────────────────────────────────────────────
# PATHS
# ──────────────────────────────────────────────

paths:

  # ─── AUTH ────────────────────────────────────

  /auth/register/step1:
    post:
      tags: [Auth]
      summary: Register step 1 — personal data
      description: |
        First step of user registration. The user submits personal data and document photos.
        The company will investigate asynchronously and assign a category.
        An email verification link is sent to the provided email address.
      operationId: registerStep1
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - nombre
                - documento
                - email
                - direccion
                - numeroPais
                - documentoFrente
                - documentoDorso
              properties:
                nombre:
                  type: string
                  example: Juan Pérez
                documento:
                  type: string
                  example: "40123456"
                email:
                  type: string
                  format: email
                  example: juan@email.com
                direccion:
                  type: string
                  example: Av. Corrientes 1234, CABA
                numeroPais:
                  type: integer
                  description: Country ID from /countries
                  example: 1
                documentoFrente:
                  type: string
                  format: binary
                  description: Front side photo of the identity document
                documentoDorso:
                  type: string
                  format: binary
                  description: Back side photo of the identity document
      responses:
        "201":
          description: Registration request created. Verification email sent.
          content:
            application/json:
              schema:
                type: object
                properties:
                  registrationId:
                    type: integer
                  message:
                    type: string
                    example: Registration received. Please check your email to continue.
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          description: Document already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /auth/verify-email/{token}:
    post:
      tags: [Auth]
      summary: Verify email address
      description: |
        Verifies the user's email using the token sent during step 1.
        Returns a temporary token required to complete step 2.
      operationId: verifyEmail
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Email verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  temporaryToken:
                    type: string
                    description: Token to use in step 2
                  message:
                    type: string
                    example: Email verified. Proceed to complete registration.
        "401":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/register/step2:
    post:
      tags: [Auth]
      summary: Register step 2 — password and payment method
      description: |
        Completes registration. Requires the temporary token from email verification.
        User must set a password and register at least one payment method.
        After this step the user account becomes active.
      operationId: registerStep2
      security:
        - temporaryAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
                - passwordConfirm
                - paymentMethod
              properties:
                password:
                  type: string
                  format: password
                  minLength: 8
                passwordConfirm:
                  type: string
                  format: password
                paymentMethod:
                  $ref: "#/components/schemas/PaymentMethodCreate"
      responses:
        "200":
          description: Registration complete. User is now active.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Registration complete. You can now log in.
                  userId:
                    type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid or expired temporary token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in
      description: |
        Authenticates the user and returns JWT access and refresh tokens.
        Returns 403 if the user is banned due to repeated non-payment.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - documento
                - password
              properties:
                documento:
                  type: string
                  example: "40123456"
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
                  user:
                    $ref: "#/components/schemas/UserProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: User is banned (repeated non-payment)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auth/password-reset:
    post:
      tags: [Auth]
      summary: Request password reset
      description: Sends a password reset email. Always returns 200 to avoid revealing user existence.
      operationId: requestPasswordReset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - documento
                - email
              properties:
                documento:
                  type: string
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: If the account exists, a reset email has been sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: If an account with that information exists, a reset email has been sent.
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/password-reset/{token}:
    put:
      tags: [Auth]
      summary: Set new password
      operationId: resetPassword
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password
                - passwordConfirm
              properties:
                password:
                  type: string
                  format: password
                  minLength: 8
                passwordConfirm:
                  type: string
                  format: password
      responses:
        "200":
          description: Password updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Password updated successfully.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Invalid or expired reset token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─── USERS / PROFILE ────────────────────────

  /users/me:
    get:
      tags: [Users]
      summary: Get own profile
      operationId: getProfile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [Users]
      summary: Update own profile
      description: Only editable fields (nombre, direccion) can be updated. Document and category cannot be changed.
      operationId: updateProfile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                nombre:
                  type: string
                direccion:
                  type: string
      responses:
        "200":
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/photo:
    put:
      tags: [Users]
      summary: Upload or update profile photo
      operationId: updateProfilePhoto
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - photo
              properties:
                photo:
                  type: string
                  format: binary
                  description: JPEG or PNG, max 5MB
      responses:
        "200":
          description: Photo updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  photoUrl:
                    type: string
                    format: uri
        "400":
          description: Invalid format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          description: File too large (max 5MB)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /users/me/metrics:
    get:
      tags: [Users]
      summary: Get user metrics
      description: |
        Returns auction participation statistics:
        - Total auctions attended
        - Win count
        - Total amounts bid and paid
        - Categories participated in
      operationId: getUserMetrics
      security:
        - bearerAuth: []
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date
          description: Start date filter
        - name: to
          in: query
          schema:
            type: string
            format: date
          description: End date filter
      responses:
        "200":
          description: User metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserMetrics"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/auctions:
    get:
      tags: [Users]
      summary: Get auction history
      operationId: getUserAuctions
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: status
          in: query
          schema:
            type: string
            enum: [won, lost, attended]
          description: Filter by participation result
      responses:
        "200":
          description: Paginated list of auctions the user participated in
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AuctionListItem"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/auctions/{auctionId}/bids:
    get:
      tags: [Users]
      summary: Get own bids in a specific auction
      operationId: getUserBidsInAuction
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AuctionIdParam"
      responses:
        "200":
          description: List of user's bids in the auction
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bid"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/me/penalties:
    get:
      tags: [Users]
      summary: View pending penalties
      description: Lists all pending fines from non-payment. Penalties must be paid before participating in new auctions.
      operationId: getUserPenalties
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of penalties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Penalty"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/me/penalties/{penaltyId}/pay:
    post:
      tags: [Users]
      summary: Pay a pending penalty
      description: Pays the 10% fine. Must be paid before user can participate in any new auction.
      operationId: payPenalty
      security:
        - bearerAuth: []
      parameters:
        - name: penaltyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - paymentMethodId
              properties:
                paymentMethodId:
                  type: integer
      responses:
        "200":
          description: Penalty paid successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Penalty paid successfully.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          description: Insufficient funds
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── PAYMENT METHODS ────────────────────────

  /payment-methods:
    get:
      tags: [Payment Methods]
      summary: List own payment methods
      operationId: listPaymentMethods
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [bank_account, credit_card, certified_check]
          description: Filter by payment method type
      responses:
        "200":
          description: List of payment methods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentMethod"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /payment-methods/bank-accounts:
    post:
      tags: [Payment Methods]
      summary: Register a bank account
      operationId: createBankAccount
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BankAccountCreate"
      responses:
        "201":
          description: Bank account registered (pending verification)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankAccount"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /payment-methods/credit-cards:
    post:
      tags: [Payment Methods]
      summary: Register a credit card
      operationId: createCreditCard
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreditCardCreate"
      responses:
        "201":
          description: Credit card registered (pending verification)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreditCard"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /payment-methods/certified-checks:
    post:
      tags: [Payment Methods]
      summary: Register a certified check
      description: |
        Registers a certified check with a fixed amount. The check must be verified
        before the auction starts. Purchases using this method cannot exceed the check amount.
      operationId: createCertifiedCheck
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CertifiedCheckCreate"
      responses:
        "201":
          description: Certified check registered (pending verification)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CertifiedCheck"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /payment-methods/{id}:
    get:
      tags: [Payment Methods]
      summary: Get payment method details
      operationId: getPaymentMethod
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Payment method details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentMethod"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Payment Methods]
      summary: Update a payment method
      description: Cannot be updated if linked to an active auction.
      operationId: updatePaymentMethod
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentMethodUpdate"
      responses:
        "200":
          description: Payment method updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentMethod"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Cannot update — linked to an active auction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [Payment Methods]
      summary: Delete a payment method
      description: Cannot delete if it is the user's only verified payment method.
      operationId: deletePaymentMethod
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Payment method deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Cannot delete — it is the only verified payment method
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─── AUCTIONS ───────────────────────────────

  /auctions:
    get:
      tags: [Auctions]
      summary: List auctions
      operationId: listAuctions
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: status
          in: query
          schema:
            type: string
            enum: [abierta, cerrada]
        - name: category
          in: query
          schema:
            type: string
            enum: [comun, especial, plata, oro, platino]
        - name: currency
          in: query
          schema:
            type: string
            enum: [ARS, USD]
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Paginated list of auctions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AuctionListItem"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auctions/{id}:
    get:
      tags: [Auctions]
      summary: Get auction details
      operationId: getAuction
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AuctionIdParam"
      responses:
        "200":
          description: Auction details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Auction"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /auctions/{id}/catalog:
    get:
      tags: [Auctions]
      summary: Get auction catalog
      description: |
        Returns the catalog items for this auction.
        The `precioBase` field is only visible to registered and admitted users.
      operationId: getAuctionCatalog
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AuctionIdParam"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Paginated catalog items
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/CatalogItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /auctions/{id}/catalog/{itemId}:
    get:
      tags: [Auctions]
      summary: Get catalog item details
      description: Returns full details of a catalog item including photos, description, artist info, and history.
      operationId: getCatalogItem
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AuctionIdParam"
        - $ref: "#/components/parameters/ItemIdParam"
      responses:
        "200":
          description: Catalog item details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogItemDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /auctions/{id}/register:
    post:
      tags: [Auctions]
      summary: Register as auction attendee
      description: |
        Registers the authenticated client as a bidder for this auction.
        Assigns a unique bidder number (numeroPostor) for the event.

        **Business rules:**
        - Client category must be >= auction category
        - Client must be admitted (admitido = 'si')
        - Client must not have pending penalties
        - Client must have at least one verified payment method
      operationId: registerForAuction
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AuctionIdParam"
      responses:
        "201":
          description: Successfully registered as attendee
          content:
            application/json:
              schema:
                type: object
                properties:
                  asistente:
                    type: object
                    properties:
                      id:
                        type: integer
                      numeroPostor:
                        type: integer
                        description: Unique bidder number for this auction
        "400":
          description: Already registered for this auction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Insufficient category, not admitted, or no verified payment method
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: User has pending penalties
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auctions/{id}/connect:
    post:
      tags: [Auctions]
      summary: Connect to live auction
      description: |
        Connects the user to a live auction session. Returns a WebSocket URL and
        connection token for real-time bidding.

        **Business rules:**
        - User must be registered as attendee for this auction
        - User can only be connected to ONE auction at a time
      operationId: connectToAuction
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AuctionIdParam"
      responses:
        "200":
          description: Connected successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  connectionToken:
                    type: string
                    description: Token to authenticate WebSocket connection
                  wsUrl:
                    type: string
                    format: uri
                    example: wss://api.crownbid.com/ws/auctions/1
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Not registered as attendee for this auction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Already connected to another auction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auctions/{id}/disconnect:
    post:
      tags: [Auctions]
      summary: Disconnect from live auction
      operationId: disconnectFromAuction
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AuctionIdParam"
      responses:
        "200":
          description: Disconnected successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Disconnected from auction.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: User was not connected to this auction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /auctions/{id}/results:
    get:
      tags: [Auctions]
      summary: Get auction results
      description: Returns results for a closed auction. Only available after the auction has ended.
      operationId: getAuctionResults
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AuctionIdParam"
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Paginated auction results
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/AuctionResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Auction is still open
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── BIDDING ────────────────────────────────

  /auctions/{auctionId}/items/{itemId}/bids:
    post:
      tags: [Bidding]
      summary: Place a bid
      description: |
        Places a bid on a catalog item in an active auction.

        **Bid amount rules:**
        - Minimum: last offer + 1% of item's base price
        - Maximum: last offer + 20% of item's base price
        - `oro` and `platino` category users have NO bid limits

        **Additional validations:**
        - User must be connected to this auction
        - User must have at least one verified payment method
        - Previous bid must be confirmed before placing a new one
        - If using a certified check, accumulated bids cannot exceed check amount
        - Auction must be open and item must not have been sold yet
      operationId: placeBid
      security:
        - bearerAuth: []
      parameters:
        - name: auctionId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BidRequest"
      responses:
        "201":
          description: Bid accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bid"
        "400":
          description: Bid amount out of allowed range
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Error"
                  - type: object
                    properties:
                      minAllowed:
                        type: number
                        format: double
                        description: Minimum allowed bid amount
                      maxAllowed:
                        type: number
                        format: double
                        description: Maximum allowed bid amount
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          description: Insufficient funds (certified check limit exceeded)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: No verified payment method or not connected to auction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Previous bid not yet confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Auction closed or item already sold
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags: [Bidding]
      summary: Get bid history for an item
      operationId: getItemBids
      security:
        - bearerAuth: []
      parameters:
        - name: auctionId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Paginated bid history
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/BidPublic"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /auctions/{auctionId}/items/{itemId}/bids/current:
    get:
      tags: [Bidding]
      summary: Get current highest bid
      operationId: getCurrentHighestBid
      security:
        - bearerAuth: []
      parameters:
        - name: auctionId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Current highest bid (null if no bids yet)
          content:
            application/json:
              schema:
                type: object
                properties:
                  highestBid:
                    type: number
                    format: double
                    nullable: true
                  bidderNumber:
                    type: integer
                    nullable: true
                    description: Bidder's postor number (anonymized)
                  timestamp:
                    type: string
                    format: date-time
                    nullable: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── PRODUCTS ───────────────────────────────

  /products:
    post:
      tags: [Products]
      summary: Submit a product for auction
      description: |
        Submits a new product to be considered for auction.
        The ownership declaration checkbox must be accepted.
        Photos must be uploaded separately via POST /products/{id}/photos (minimum 6 required).
      operationId: createProduct
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductCreate"
      responses:
        "201":
          description: Product submitted with status 'pendiente'
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Missing required fields or ownership declaration not accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
    get:
      tags: [Products]
      summary: List own products
      operationId: listOwnProducts
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: status
          in: query
          schema:
            type: string
            enum: [pendiente, en_inspeccion, aceptado, rechazado, en_subasta]
      responses:
        "200":
          description: Paginated list of own products
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Product"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /products/{id}:
    get:
      tags: [Products]
      summary: Get product details
      operationId: getProduct
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductIdParam"
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /products/{id}/photos:
    post:
      tags: [Products]
      summary: Upload product photos
      description: Upload one or more photos for a product. Minimum 6 photos required before submitting for inspection.
      operationId: uploadProductPhotos
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductIdParam"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - photos
              properties:
                photos:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: One or more photo files (JPEG/PNG)
      responses:
        "201":
          description: Photos uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  uploaded:
                    type: integer
                    description: Number of photos uploaded
                  totalPhotos:
                    type: integer
                    description: Total photos for this product
        "400":
          description: Invalid file format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          description: File too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Maximum photo limit reached (20)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      tags: [Products]
      summary: Get product photos
      operationId: getProductPhotos
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductIdParam"
      responses:
        "200":
          description: List of product photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Photo"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /products/{id}/photos/{photoId}:
    delete:
      tags: [Products]
      summary: Delete a product photo
      description: Cannot delete if it would leave the product with fewer than 6 photos (when already submitted for inspection).
      operationId: deleteProductPhoto
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductIdParam"
        - name: photoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Photo deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Cannot delete — would leave fewer than 6 photos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /products/{id}/submit-for-inspection:
    post:
      tags: [Products]
      summary: Submit product for company inspection
      description: |
        Sends the product for physical inspection by the company.
        Requires at least 6 photos already uploaded.
        The owner must arrange shipping to the company address.
      operationId: submitForInspection
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductIdParam"
      responses:
        "200":
          description: Product submitted for inspection
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Product submitted for inspection.
                  shippingAddress:
                    type: string
                    description: Company address to ship the product to
        "400":
          description: Less than 6 photos uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Product is already in inspection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /products/{id}/inspection:
    get:
      tags: [Products]
      summary: Get inspection result
      description: |
        Returns the inspection result for a product.
        - If rejected: includes rejection reason and return shipping cost.
        - If accepted: includes proposed auction details (date, time, location, base price, commission).
      operationId: getInspectionResult
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductIdParam"
      responses:
        "200":
          description: Inspection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InspectionResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Product not inspected yet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /products/{id}/inspection/accept:
    post:
      tags: [Products]
      summary: Accept auction conditions
      description: |
        Owner accepts the proposed auction conditions (date, time, base price, commission).
        The product will be included in the auction catalog.
      operationId: acceptInspection
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - bankAccountId
              properties:
                bankAccountId:
                  type: integer
                  description: Bank account to receive auction proceeds (must be declared before auction starts)
      responses:
        "200":
          description: Conditions accepted — product will be auctioned
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Conditions accepted. Your product will be included in the auction.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Product not accepted by company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Already responded to inspection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /products/{id}/inspection/reject:
    post:
      tags: [Products]
      summary: Reject auction conditions and request return
      description: Owner rejects the proposed conditions. The product will be returned at the owner's cost.
      operationId: rejectInspection
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductIdParam"
      responses:
        "200":
          description: Return initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Return initiated. You will be charged for return shipping.
                  returnCost:
                    type: number
                    format: double
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Product not accepted by company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Already responded to inspection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /products/{id}/location:
    get:
      tags: [Products]
      summary: View product storage location
      description: Returns the warehouse location where the product is stored. Only available for accepted products in company custody.
      operationId: getProductLocation
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductIdParam"
      responses:
        "200":
          description: Product location
          content:
            application/json:
              schema:
                type: object
                properties:
                  warehouse:
                    type: string
                  address:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Product not in storage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─── INSURANCE ──────────────────────────────

  /products/{id}/insurance:
    get:
      tags: [Insurance]
      summary: View product insurance policy
      description: |
        Returns the insurance policy details for a product.
        Only the owner can view this information.
        A combined policy may cover multiple items from the same owner.
      operationId: getProductInsurance
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductIdParam"
      responses:
        "200":
          description: Insurance policy details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Insurance"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Product has no insurance or product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /products/{id}/insurance/increase-coverage:
    post:
      tags: [Insurance]
      summary: Request increased coverage
      description: |
        Owner requests to increase the insurance coverage amount.
        The new amount must be higher than the current coverage.
        The owner pays the difference in premium.
      operationId: requestCoverageIncrease
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ProductIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - newAmount
                - paymentMethodId
              properties:
                newAmount:
                  type: number
                  format: double
                  description: New desired coverage amount (must be greater than current)
                paymentMethodId:
                  type: integer
                  description: Payment method for the premium difference
      responses:
        "200":
          description: Coverage increase request submitted to the insurance company
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Coverage increase request submitted.
                  premiumDifference:
                    type: number
                    format: double
        "400":
          description: New amount not greater than current coverage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Product has no insurance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ─── COUNTRIES ──────────────────────────────

  /countries:
    get:
      tags: [Countries]
      summary: List countries
      operationId: listCountries
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search by country name
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Paginated list of countries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Country"

  /countries/{id}:
    get:
      tags: [Countries]
      summary: Get country details
      operationId: getCountry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Country details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Country"
        "404":
          $ref: "#/components/responses/NotFound"

  # ─── ADMIN ─────────────────────────────────

  /admin/registrations/{id}/approve:
    put:
      tags: [Admin]
      summary: Approve registration and assign category
      description: Employee approves a pending registration and assigns a user category based on investigation results.
      operationId: approveRegistration
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - categoria
              properties:
                categoria:
                  type: string
                  enum: [comun, especial, plata, oro, platino]
      responses:
        "200":
          description: Registration approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Registration approved. Verification email sent to user.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/registrations/{id}/reject:
    put:
      tags: [Admin]
      summary: Reject registration
      operationId: rejectRegistration
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Registration rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/products/{id}/inspect:
    put:
      tags: [Admin]
      summary: Record inspection result
      description: Employee records whether the product was accepted or rejected after physical inspection.
      operationId: recordInspection
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [aceptado, rechazado]
                rejectionReason:
                  type: string
                  description: Required when status is 'rechazado'
                precioBase:
                  type: number
                  format: double
                  description: Required when status is 'aceptado'
                comision:
                  type: number
                  format: double
                  description: Required when status is 'aceptado'
                subastaId:
                  type: integer
                  description: Target auction ID (required when status is 'aceptado')
      responses:
        "200":
          description: Inspection result recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/payment-methods/{id}/verify:
    put:
      tags: [Admin]
      summary: Verify a payment method
      operationId: verifyPaymentMethod
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - verified
              properties:
                verified:
                  type: boolean
      responses:
        "200":
          description: Payment method verification updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/auctions:
    post:
      tags: [Admin]
      summary: Create an auction
      description: |
        Creates a new auction. Date must be at least 10 days in the future.
        Each auction is mono-currency (ARS or USD only).
      operationId: createAuction
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fecha
                - hora
                - categoria
                - currency
                - ubicacion
              properties:
                fecha:
                  type: string
                  format: date
                  description: Must be at least 10 days from now
                hora:
                  type: string
                  format: time
                  example: "14:00:00"
                categoria:
                  type: string
                  enum: [comun, especial, plata, oro, platino]
                currency:
                  type: string
                  enum: [ARS, USD]
                ubicacion:
                  type: string
                capacidadAsistentes:
                  type: integer
                  nullable: true
                tieneDeposito:
                  type: boolean
                  default: false
                seguridadPropia:
                  type: boolean
                  default: false
                subastadorId:
                  type: integer
                  description: Auctioneer ID
      responses:
        "201":
          description: Auction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Auction"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          description: Date is less than 10 days in the future
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /admin/auctions/{id}:
    put:
      tags: [Admin]
      summary: Update auction details
      operationId: updateAuction
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AuctionIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hora:
                  type: string
                  format: time
                ubicacion:
                  type: string
                capacidadAsistentes:
                  type: integer
                tieneDeposito:
                  type: boolean
                seguridadPropia:
                  type: boolean
                subastadorId:
                  type: integer
      responses:
        "200":
          description: Auction updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Auction"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/auctions/{id}/catalog:
    post:
      tags: [Admin]
      summary: Create catalog for auction
      operationId: createCatalog
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AuctionIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - descripcion
              properties:
                descripcion:
                  type: string
      responses:
        "201":
          description: Catalog created
          content:
            application/json:
              schema:
                type: object
                properties:
                  catalogId:
                    type: integer
                  descripcion:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/auctions/{id}/catalog/items:
    post:
      tags: [Admin]
      summary: Add item to auction catalog
      operationId: addCatalogItem
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AuctionIdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - productoId
                - precioBase
                - comision
              properties:
                productoId:
                  type: integer
                precioBase:
                  type: number
                  format: double
                  minimum: 0.01
                comision:
                  type: number
                  format: double
                  minimum: 0.01
      responses:
        "201":
          description: Item added to catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogItem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/auctions/{id}/close:
    put:
      tags: [Admin]
      summary: Close an auction
      description: |
        Closes the auction. Items with no bids are automatically purchased by the company at base price.
        Winners are notified with bid amount, commissions, and shipping costs.
      operationId: closeAuction
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AuctionIdParam"
      responses:
        "200":
          description: Auction closed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  itemsSold:
                    type: integer
                  itemsUnsold:
                    type: integer
                    description: Items bought by the company at base price
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/auctions/{id}/items/{itemId}/close:
    put:
      tags: [Admin]
      summary: Close bidding on a specific item
      description: |
        Closes bidding for an item, declaring the highest bidder as winner.
        If no bids, the company buys at base price.
      operationId: closeItem
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AuctionIdParam"
        - $ref: "#/components/parameters/ItemIdParam"
      responses:
        "200":
          description: Item closed
          content:
            application/json:
              schema:
                type: object
                properties:
                  winnerId:
                    type: integer
                    nullable: true
                    description: Client ID of the winner (null if company buys)
                  finalPrice:
                    type: number
                    format: double
                  companyPurchased:
                    type: boolean
                    description: True if no bids and company bought at base price
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /admin/users/{id}/ban:
    post:
      tags: [Admin]
      summary: Ban user for repeated non-payment
      description: Disables the user account due to repeated non-payment. Legal action is initiated.
      operationId: banUser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
                  example: Repeated non-payment — legal action initiated
      responses:
        "200":
          description: User banned
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

# ──────────────────────────────────────────────
# WEBSOCKET DOCUMENTATION
# ──────────────────────────────────────────────
# Note: OpenAPI 3.0 does not natively support WebSocket.
# The WebSocket endpoint is documented below for reference.
#
# URL: wss://{host}/ws/auctions/{auctionId}?token={connectionToken}
#
# Authentication: Use the connectionToken from POST /auctions/{id}/connect
#
# Server → Client messages:
#   BID_UPDATE:           { type, itemId, amount, bidderNumber, timestamp }
#   ITEM_CHANGE:          { type, newItemId, description, basePrice, images[] }
#   AUCTION_CLOSED:       { type, auctionId }
#   BID_CONFIRMED:        { type, bidId, amount }
#   BID_REJECTED:         { type, reason, code }
#   WINNER_NOTIFICATION:  { type, itemId, amount, commission, shippingCost, total, pickupAvailable }
#
# Client → Server messages:
#   PLACE_BID:  { type, itemId, amount, paymentMethodId }
#   HEARTBEAT:  { type }

# ──────────────────────────────────────────────
# COMPONENTS
# ──────────────────────────────────────────────

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from POST /auth/login
    temporaryAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Temporary token obtained from POST /auth/verify-email/{token}

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
      description: Page number
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
      description: Items per page
    AuctionIdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Auction ID
    ItemIdParam:
      name: itemId
      in: path
      required: true
      schema:
        type: integer
      description: Catalog item ID
    ProductIdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Product ID

  responses:
    BadRequest:
      description: Invalid request data
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    UnprocessableEntity:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/Error"
              - type: object
                properties:
                  retryAfter:
                    type: integer
                    description: Seconds to wait before retrying

  schemas:

    # ─── ERROR ──────────────────────────────

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: BAD_REQUEST
        message:
          type: string
          example: Invalid request data
        details:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    # ─── PAGINATION ─────────────────────────

    PaginatedResponse:
      type: object
      properties:
        data:
          type: array
          items: {}
        total:
          type: integer
          description: Total number of records
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer

    # ─── USER / PROFILE ─────────────────────

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        nombre:
          type: string
        documento:
          type: string
        direccion:
          type: string
        estado:
          type: string
          enum: [activo, inactivo]
        fotoUrl:
          type: string
          format: uri
          nullable: true
        categoria:
          type: string
          enum: [comun, especial, plata, oro, platino]
          nullable: true
        admitido:
          type: boolean
        pais:
          $ref: "#/components/schemas/Country"
        roles:
          type: array
          items:
            type: string
            enum: [client, owner, employee, auctioneer]

    UserMetrics:
      type: object
      properties:
        auctionsAttended:
          type: integer
        wins:
          type: integer
        totalBid:
          type: number
          format: double
          description: Sum of all bids placed
        totalPaid:
          type: number
          format: double
          description: Sum of winning bids paid
        categoriesParticipated:
          type: array
          items:
            type: string
            enum: [comun, especial, plata, oro, platino]

    # ─── AUCTION ────────────────────────────

    Auction:
      type: object
      properties:
        id:
          type: integer
        fecha:
          type: string
          format: date
        hora:
          type: string
          format: time
        estado:
          type: string
          enum: [abierta, cerrada]
        categoria:
          type: string
          enum: [comun, especial, plata, oro, platino]
        currency:
          type: string
          enum: [ARS, USD]
        ubicacion:
          type: string
        capacidadAsistentes:
          type: integer
          nullable: true
        tieneDeposito:
          type: boolean
        seguridadPropia:
          type: boolean
        subastador:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            nombre:
              type: string
            matricula:
              type: string
            region:
              type: string

    AuctionListItem:
      type: object
      properties:
        id:
          type: integer
        fecha:
          type: string
          format: date
        hora:
          type: string
          format: time
        estado:
          type: string
          enum: [abierta, cerrada]
        categoria:
          type: string
          enum: [comun, especial, plata, oro, platino]
        currency:
          type: string
          enum: [ARS, USD]
        ubicacion:
          type: string
        capacidadAsistentes:
          type: integer
          nullable: true
        itemCount:
          type: integer
          description: Number of items in the catalog

    AuctionResult:
      type: object
      properties:
        itemId:
          type: integer
        productDescription:
          type: string
        winnerId:
          type: integer
          nullable: true
        winnerName:
          type: string
          nullable: true
        importe:
          type: number
          format: double
        comision:
          type: number
          format: double
        companyPurchased:
          type: boolean
          description: True if company bought at base price (no bids)

    # ─── CATALOG ITEMS ──────────────────────

    CatalogItem:
      type: object
      properties:
        id:
          type: integer
        numero:
          type: integer
          description: Item number within the catalog
        descripcion:
          type: string
        precioBase:
          type: number
          format: double
          nullable: true
          description: Only visible to registered and admitted users
        comision:
          type: number
          format: double
          nullable: true
        subastado:
          type: boolean
        thumbnailUrl:
          type: string
          format: uri
          nullable: true

    CatalogItemDetail:
      type: object
      properties:
        id:
          type: integer
        numero:
          type: integer
        descripcion:
          type: string
        precioBase:
          type: number
          format: double
          nullable: true
          description: Only visible to registered and admitted users
        comision:
          type: number
          format: double
          nullable: true
        subastado:
          type: boolean
        duenio:
          type: object
          properties:
            id:
              type: integer
            nombre:
              type: string
        photos:
          type: array
          items:
            $ref: "#/components/schemas/Photo"
        artistName:
          type: string
          nullable: true
        date:
          type: string
          nullable: true
          description: Date or era of the item
        history:
          type: string
          nullable: true
          description: Historical context of the item

    # ─── BIDDING ────────────────────────────

    BidRequest:
      type: object
      required:
        - amount
        - paymentMethodId
      properties:
        amount:
          type: number
          format: double
          minimum: 0.01
        paymentMethodId:
          type: integer
          description: ID of the verified payment method to use

    Bid:
      type: object
      properties:
        id:
          type: integer
        itemId:
          type: integer
        amount:
          type: number
          format: double
        ganador:
          type: boolean
        timestamp:
          type: string
          format: date-time

    BidPublic:
      type: object
      properties:
        id:
          type: integer
        bidderNumber:
          type: integer
          description: Anonymized postor number
        amount:
          type: number
          format: double
        timestamp:
          type: string
          format: date-time

    # ─── PAYMENT METHODS ────────────────────

    PaymentMethod:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [bank_account, credit_card, certified_check]
        verified:
          type: boolean
        details:
          oneOf:
            - $ref: "#/components/schemas/BankAccount"
            - $ref: "#/components/schemas/CreditCard"
            - $ref: "#/components/schemas/CertifiedCheck"

    PaymentMethodCreate:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum: [bank_account, credit_card, certified_check]
        bankAccount:
          $ref: "#/components/schemas/BankAccountCreate"
        creditCard:
          $ref: "#/components/schemas/CreditCardCreate"
        certifiedCheck:
          $ref: "#/components/schemas/CertifiedCheckCreate"

    PaymentMethodUpdate:
      type: object
      properties:
        bankName:
          type: string
        accountNumber:
          type: string
        reservedFunds:
          type: number
          format: double
        holderName:
          type: string

    BankAccount:
      type: object
      properties:
        bankName:
          type: string
        accountNumber:
          type: string
        cbu:
          type: string
          nullable: true
          description: For local Argentine accounts
        iban:
          type: string
          nullable: true
          description: For international accounts
        currency:
          type: string
          enum: [ARS, USD]
        isInternational:
          type: boolean
        reservedFunds:
          type: number
          format: double

    BankAccountCreate:
      type: object
      required:
        - bankName
        - accountNumber
        - currency
        - isInternational
      properties:
        bankName:
          type: string
        accountNumber:
          type: string
        cbu:
          type: string
          description: Required for local accounts
        iban:
          type: string
          description: Required for international accounts
        currency:
          type: string
          enum: [ARS, USD]
        isInternational:
          type: boolean
        reservedFunds:
          type: number
          format: double
          description: Funds reserved for auction participation

    CreditCard:
      type: object
      properties:
        lastFourDigits:
          type: string
        holderName:
          type: string
        expirationDate:
          type: string
          example: "12/28"
        isInternational:
          type: boolean
        brand:
          type: string
          example: Visa

    CreditCardCreate:
      type: object
      required:
        - cardNumber
        - holderName
        - expirationDate
        - isInternational
        - brand
      properties:
        cardNumber:
          type: string
          description: Full card number (will be stored as last 4 digits)
        holderName:
          type: string
        expirationDate:
          type: string
          example: "12/28"
        isInternational:
          type: boolean
        brand:
          type: string

    CertifiedCheck:
      type: object
      properties:
        checkNumber:
          type: string
        bankName:
          type: string
        amount:
          type: number
          format: double
          description: Fixed amount of the check
        currency:
          type: string
          enum: [ARS, USD]

    CertifiedCheckCreate:
      type: object
      required:
        - checkNumber
        - bankName
        - amount
        - currency
      properties:
        checkNumber:
          type: string
        bankName:
          type: string
        amount:
          type: number
          format: double
          minimum: 0.01
        currency:
          type: string
          enum: [ARS, USD]

    # ─── PRODUCTS ───────────────────────────

    Product:
      type: object
      properties:
        id:
          type: integer
        fecha:
          type: string
          format: date
          nullable: true
        disponible:
          type: boolean
        descripcionCatalogo:
          type: string
          nullable: true
        descripcionCompleta:
          type: string
        status:
          type: string
          enum: [pendiente, en_inspeccion, aceptado, rechazado, en_subasta]
        photoCount:
          type: integer
        duenio:
          type: object
          properties:
            id:
              type: integer
            nombre:
              type: string
        seguro:
          type: string
          nullable: true
          description: Insurance policy number

    ProductCreate:
      type: object
      required:
        - descripcionCompleta
        - ownershipDeclaration
      properties:
        descripcionCatalogo:
          type: string
          maxLength: 500
        descripcionCompleta:
          type: string
          maxLength: 300
        ownershipDeclaration:
          type: boolean
          description: Must be true — user declares ownership and right to auction
        artistName:
          type: string
          nullable: true
        date:
          type: string
          nullable: true
          description: Date or era of the item
        history:
          type: string
          nullable: true
          description: Historical context

    Photo:
      type: object
      properties:
        id:
          type: integer
        url:
          type: string
          format: uri

    # ─── INSURANCE ──────────────────────────

    Insurance:
      type: object
      properties:
        nroPoliza:
          type: string
        compania:
          type: string
        polizaCombinada:
          type: boolean
          description: True if this policy covers multiple items from the same owner
        importe:
          type: number
          format: double
        productsCovered:
          type: array
          items:
            type: object
            properties:
              productId:
                type: integer
              descripcion:
                type: string

    # ─── INSPECTION ─────────────────────────

    InspectionResult:
      type: object
      properties:
        status:
          type: string
          enum: [aceptado, rechazado]
        rejectionReason:
          type: string
          nullable: true
          description: Present only when status is 'rechazado'
        returnCost:
          type: number
          format: double
          nullable: true
          description: Return shipping cost (only for rejected items)
        auctionDetails:
          type: object
          nullable: true
          description: Present only when status is 'aceptado'
          properties:
            auctionId:
              type: integer
            fecha:
              type: string
              format: date
            hora:
              type: string
              format: time
            ubicacion:
              type: string
            precioBase:
              type: number
              format: double
            comision:
              type: number
              format: double
        responded:
          type: boolean
          description: Whether the owner has accepted or rejected the conditions

    # ─── COUNTRY ────────────────────────────

    Country:
      type: object
      properties:
        numero:
          type: integer
        nombre:
          type: string
        nombreCorto:
          type: string
          nullable: true
        capital:
          type: string
        nacionalidad:
          type: string
        idiomas:
          type: string

    # ─── PENALTY ────────────────────────────

    Penalty:
      type: object
      properties:
        id:
          type: integer
        amount:
          type: number
          format: double
          description: 10% fine on the unpaid bid amount
        reason:
          type: string
        status:
          type: string
          enum: [pending, paid]
        dueDate:
          type: string
          format: date-time
          description: 72 hours from penalty creation
        createdAt:
          type: string
          format: date-time
