<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>Crown Bid — Splash</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px;
    background: #1B2838;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    overflow: hidden;
  }
  .logo-container {
    display: flex; flex-direction: column;
    align-items: center; gap: 24px;
  }
  .logo-icon {
    width: 120px; height: 120px;
    background: linear-gradient(135deg, #C5A55A 0%, #E8D5A0 50%, #C5A55A 100%);
    border-radius: 28px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 32px rgba(197,165,90,0.3);
  }
  .logo-icon svg { width: 72px; height: 72px; }
  .app-name {
    font-size: 36px; font-weight: 700;
    color: #C5A55A;
    letter-spacing: 2px;
  }
  .tagline {
    font-size: 16px; font-weight: 400;
    color: rgba(197,165,90,0.6);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: -8px;
  }
  .loader {
    margin-top: 60px;
    width: 40px; height: 4px;
    background: rgba(197,165,90,0.2);
    border-radius: 2px;
    overflow: hidden;
  }
  .loader-bar {
    width: 60%; height: 100%;
    background: #C5A55A;
    border-radius: 2px;
  }
</style>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
  <div class="logo-container">
    <div class="logo-icon">
      <svg viewBox="0 0 72 72" fill="none">
        <!-- Crown -->
        <path d="M12 44L18 24L28 34L36 18L44 34L54 24L60 44Z" fill="#1B2838" stroke="#1B2838" stroke-width="2" stroke-linejoin="round"/>
        <rect x="12" y="44" width="48" height="8" rx="2" fill="#1B2838"/>
        <!-- Gavel hint -->
        <circle cx="36" cy="34" r="3" fill="#C5A55A" opacity="0.3"/>
      </svg>
    </div>
    <div class="app-name">CROWN BID</div>
    <div class="tagline">Subastas en vivo</div>
  </div>
  <div class="loader">
    <div class="loader-bar"></div>
  </div>
</body>
</html>
