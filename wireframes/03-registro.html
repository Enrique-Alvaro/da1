<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>Crown Bid — Registro</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 390px; height: 844px;
    background: #F5F5F5;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .status-bar {
    height: 54px; padding: 0 24px;
    display: flex; align-items: flex-end; justify-content: space-between;
    font-size: 15px; font-weight: 600; color: #1B2838;
    padding-bottom: 8px;
  }
  .nav-bar {
    height: 56px; display: flex; align-items: center;
    padding: 0 16px; gap: 12px;
  }
  .back-btn {
    width: 40px; height: 40px; border-radius: 12px;
    background: #FFFFFF; border: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; color: #1B2838;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .nav-title {
    font-size: 18px; font-weight: 700; color: #1B2838;
  }
  .progress-bar {
    height: 4px; margin: 0 24px 8px;
    background: #E0E0E0; border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    width: 50%; height: 100%;
    background: #C5A55A; border-radius: 2px;
  }
  .step-label {
    padding: 0 24px; font-size: 13px;
    color: #8E8E93; margin-bottom: 20px;
  }
  .form {
    padding: 0 24px; display: flex;
    flex-direction: column; gap: 14px;
    flex: 1; overflow-y: auto;
  }
  .row { display: flex; gap: 12px; }
  .row .input-group { flex: 1; }
  .input-group { display: flex; flex-direction: column; gap: 5px; }
  .input-group label {
    font-size: 13px; font-weight: 600;
    color: #1B2838; text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .input-group input, .input-group select {
    height: 50px; border-radius: 12px;
    border: 1.5px solid #E0E0E0;
    background: #FFFFFF; padding: 0 16px;
    font-size: 15px; color: #1B2838;
    outline: none; -webkit-appearance: none;
  }
  .input-group input::placeholder { color: #8E8E93; }
  .input-group select { color: #8E8E93; }
  .doc-section {
    margin-top: 4px;
  }
  .doc-section .section-title {
    font-size: 13px; font-weight: 600;
    color: #1B2838; text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 10px;
  }
  .doc-uploads { display: flex; gap: 12px; }
  .upload-box {
    flex: 1; height: 110px;
    border-radius: 14px;
    border: 2px dashed #C5A55A;
    background: rgba(197,165,90,0.06);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; cursor: pointer;
  }
  .upload-icon {
    width: 36px; height: 36px;
    border-radius: 10px; background: rgba(197,165,90,0.15);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: #C5A55A;
  }
  .upload-label {
    font-size: 12px; font-weight: 600;
    color: #C5A55A; text-align: center;
  }
  .bottom-section {
    padding: 16px 24px 34px;
    background: #F5F5F5;
  }
  .btn-primary {
    width: 100%; height: 56px;
    border-radius: 14px; background: #C5A55A;
    border: none; color: #FFFFFF;
    font-size: 17px; font-weight: 700;
    letter-spacing: 0.5px; cursor: pointer;
    box-shadow: 0 4px 16px rgba(197,165,90,0.3);
  }
</style>
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
  <div class="status-bar">
    <span>9:41</span>
    <span>⦿ ⦿ ⦿</span>
  </div>

  <div class="nav-bar">
    <button class="back-btn">←</button>
    <span class="nav-title">Crear Cuenta</span>
  </div>

  <div class="progress-bar"><div class="progress-fill"></div></div>
  <div class="step-label">Paso 1 de 2 — Datos personales</div>

  <div class="form">
    <div class="row">
      <div class="input-group">
        <label>Nombre</label>
        <input type="text" placeholder="Juan">
      </div>
      <div class="input-group">
        <label>Apellido</label>
        <input type="text" placeholder="Pérez">
      </div>
    </div>

    <div class="input-group">
      <label>Nro. Documento</label>
      <input type="text" placeholder="12.345.678">
    </div>

    <div class="input-group">
      <label>Domicilio</label>
      <input type="text" placeholder="Av. Corrientes 1234, CABA">
    </div>

    <div class="input-group">
      <label>País</label>
      <select>
        <option>Seleccionar país</option>
      </select>
    </div>

    <div class="doc-section">
      <div class="section-title">Documento de identidad</div>
      <div class="doc-uploads">
        <div class="upload-box">
          <div class="upload-icon">📷</div>
          <span class="upload-label">DNI Frente</span>
        </div>
        <div class="upload-box">
          <div class="upload-icon">📷</div>
          <span class="upload-label">DNI Dorso</span>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-section">
    <button class="btn-primary">Continuar →</button>
  </div>
</body>
</html>
